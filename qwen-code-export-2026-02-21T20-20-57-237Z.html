ew URLSearchParams()\n  \n  if (from) params.append('from', from)\n  if (to) params.append('to', to)\n  \n  if (params.toString()) {\n    url += `?${params.toString()}`\n  }\n  \n  const response = await fetch(url, {\n    headers: {\n      'Accept': 'application/json'\n    }\n  })\n  \n  if (!response.ok) {\n    throw new Error(`Ошибка MOEX API: ${response.status}`)\n  }\n  \n  return await response.json()\n}\n\n/**\n * Преобразование сырых данных MOEX в формат приложения\n */\nexport function transformStockData(stock) {\n  const lastPrice = stock.MARKET_LAST || 0\n  const previousPrice = stock.MARKET_LASTPREV || lastPrice\n  const change = lastPrice - previousPrice\n  const changePercent = previousPrice ? (change / previousPrice) * 100 : 0\n  const volume = stock.MARKET_VOLUME || 0\n  \n  return {\n    id: stock.SECID,\n    ticker: stock.SECID,\n    name: stock.name || stock.SHORTNAME || stock.SECID,\n    price: lastPrice,\n    change: change,\n    changePercent: changePercent,\n    yield: stock.MARKET_YIELD ? parseFloat(stock.MARKET_YIELD) : 0,\n    volume: formatVolume(volume),\n    currency: stock.CURRENCYID || 'RUB',\n    lotSize: stock.LOTSIZE || 1\n  }\n}\n\n/**\n * Форматирование объёма торгов\n */\nfunction formatVolume(volume) {\n  if (volume \u003e= 1e9) return `${(volume / 1e9).toFixed(2)}B`\n  if (volume \u003e= 1e6) return `${(volume / 1e6).toFixed(2)}M`\n  if (volume \u003e= 1e3) return `${(volume / 1e3).toFixed(2)}K`\n  return volume.toString()\n}\n"

\n  // Очистка портфеля\n  const clearPortfolio = useCallback(() =\u003e {\n    setPortfolio([])\n  }, [])\n\n  // Расчёт общей стоимости портфеля\n  const getTotalValue = useCallback((currentPrices) =\u003e {\n    return portfolio.reduce((total, position) =\u003e {\n      const currentPrice = currentPrices.find(p =\u003e p.id === position.securityId)?.price || 0\n      return total + (currentPrice * position.quantity)\n    }, 0)\n  }, [portfolio])\n\n  // Расчёт общей прибыли/убытка\n  const getTotalPnL = useCallback((currentPrices) =\u003e {\n    return portfolio.reduce((total, position) =\u003e {\n      const currentPrice = currentPrices.find(p =\u003e p.id === position.securityId)?.price || 0\n      const invested = position.avgPrice * position.quantity\n      const current = currentPrice * position.quantity\n      return total + (current - invested)\n    }, 0)\n  }, [portfolio])\n\n  return {\n    portfolio,\n    loading,\n    addPosition,\n    removePosition,\n    updatePosition,\n    clearPortfolio,\n    getTotalValue,\n    getTotalPnL\n  }\n}\n",

            "rawInput": {
              "content": "import { useState } from 'react'\nimport { Container, Row, Col, Button, Card, Table } from 'react-bootstrap'\nimport { usePortfolio } from '../hooks/usePortfolio'\nimport { useStocks } from '../hooks/useStocks'\nimport { fetchBonds, transformBondData } from '../api/moex'\nimport AddToPortfolioModal from '../components/AddToPortfolioModal'\nimport LoadingSpinner from '../components/LoadingSpinner'\nimport ErrorDisplay from '../components/ErrorDisplay'\nimport Header from '../components/Header'\n\nfunction PortfolioPage() {\n  const { portfolio, addPosition, removePosition, getTotalValue, getTotalPnL } = usePortfolio()\n  const { stocks: stockList, loading: stocksLoading, error: stocksError } = useStocks()\n  const [bonds, setBonds] = useState([])\n  const [showModal, setShowModal] = useState(false)\n  const [loadingBonds, setLoadingBonds] = useState(false)\n\n  // Загрузка облигаций при открытии модального окна\n  const handleOpenModal = async () =\u003e {\n    setShowModal(true)\n    if (bonds.length === 0 \u0026\u0026 !loadingBonds) {\n      try {\n        setLoadingBonds(true)\n        const data = await fetchBonds()\n        const transformed = data\n          .filter(bond =\u003e bond.MARKET_LAST != null \u0026\u0026 bond.MARKET_LAST \u003e 0)\n          .map(transformBondData)\n        setBonds(transformed)\n      } catch (err) {\n        console.error('Ошибка загрузки облигаций:', err)\n      } finally {\n        setLoadingBonds(false)\n      }\n    }\n  }\n\n  // Объединяем акции и облигации для выбора\n  const allSecurities = [...stockList, ...bonds]\n\n  // Получаем текущие цены для расчётов\n  const currentPrices = allSecurities.map(s =\u003e ({ id: s.id, price: s.price }))\n\n  // Позиции портфеля с текущими данными\n  const positionsWithData = portfolio.map(position =\u003e {\n    const currentPrice = currentPrices.find(p =\u003e p.id === position.securityId)?.price || 0\n    const marketValue = currentPrice * position.quantity\                   "type": "text",
                  "text": "import { useState } from 'react'\nimport { Container, Row, Col, Button, Card, Table } from 'react-bootstrap'\nimport { usePortfolio } from '../hooks/usePortfolio'\nimport { useStocks } from '../hooks/useStocks'\nimport { fetchBonds, transformBondData } from '../api/moex'\nimport AddToPortfolioModal from '../components/AddToPortfolioModal'\nimport LoadingSpinner from '../components/LoadingSpinner'\nimport ErrorDisplay from '../components/ErrorDisplay'\nimport Header from '../components/Header'\n\nfunction PortfolioPage() {\n  const { portfolio, addPosition, removePosition, getTotalValue, getTotalPnL } = usePortfolio()\n  const { stocks: stockList, loading: stocksLoading, error: stocksError } = useStocks()\n  const [bonds, setBonds] = useState([])\n  const [showModal, setShowModal] = useState(false)\n  const [loadingBonds, setLoadingBonds] = useState(false)\n\n  // Загрузка облигаций при открытии модального окна\n  const handleOpenModal = async () =\u003e {\n    setShowModal(true)\n    if (bonds.length === 0 \u0026\u0026 !loadingBonds) {\n      try {\n        setLoadingBonds(true)\n        const data = await fetchBonds()\n        const transformed = data\n          .filter(bond =\u003e bond.MARKET_LAST != null \u0026\u0026 bond.MARKET_LAST \u003e 0)\n          .map(transformBondData)\n        setBonds(transformed)\n      } catch (err) {\n        console.error('Ошибка загрузки облигаций:', err)\n      } finally {\n        setLoadingBonds(false)\n      }\n    }\n  }\n\n  // Объединяем акции и облигации для выбора\n  const allSecurities = [...stockList, ...bonds]\n\n  // Получаем текущие цены для расчётов\n  const currentPrices = allSecurities.map(s =\u003e ({ id: s.id, price: s.price }))\n\n  // Позиции портфеля с текущими данными\n  const positionsWithData = portfolio.map(position =\u003e {\n    const currentPrice = currentPrices.find(p =\u003e p.id === position.securityId)?.price || 0\n    const marketValue = currentPrice * position.quantity\n    const invested = position.avgPrice * position.quantity\n    const pnl = marketValue - invested\n    const pnlPercent = invested \u003e 0 ? (pnl / invested) * 100 : 0\n\n    return {\n      ...position,\n      currentPrice,\n      marketValue,\n      pnl,\n      pnlPercent\n    }\n  })\n\n  const totalValue = getTotalValue(currentPrices)\n  const totalPnL = getTotalPnL(currentPrices)\n  const totalInvested = portfolio.reduce((sum, p) =\u003e sum + (p.avgPrice * p.quantity), 0)\n  const totalPnLPercent = totalInvested \u003e 0 ? (totalPnL / totalInvested) * 100 : 0\n\n  if (stocksLoading) {\n    return (\n      \u003cdiv className=\"app\"\u003e\n        \u003cHeader /\u003e\n        \u003cContainer className=\"py-4\"\u003e\n          \u003cLoadingSpinner /\u003e\n        \u003c/Container\u003e\n      \u003c/div\u003e\n    )\n  }\n\n  if (stocksError) {\n    return (\n      \u003cdiv className=\"app\"\u003e\n        \u003cHeader /\u003e\n        \u003cContainer className=\"py-4\"\u003e\n          \u003cErrorDisplay message={stocksError} onRetry={() =\u003e window.location.reload()} /\u003e\n        \u003c/Container\u003e\n      \u003c/div\u003e\n    )\n  }\n\n  return (\n    \u003cdiv className=\"app\"\u003e\n      \u003cHeader /\u003e\n      \u003cContainer className=\"py-4\"\u003e\n        {/* Заголовок */}\n        \u003cRow className=\"mb-4\"\u003e\n          \u003cCol\u003e\n            \u003cdiv className=\"d-flex justify-content-between align-items-center\"\u003e\n              \u003ch2\u003e\u003ci className=\"bi bi-briefcase\"\u003e\u003c/i\u003e Мой портфель\u003c/h2\u003e\n              \u003cButton variant=\"danger\" onClick={handleOpenModal}\u003e\n                \u003ci className=\"bi bi-plus-circle\"\u003e\u003c/i\u003e Добавить бумагу\n              \u003c/Button\u003e\n            \u003c/div\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Сводка */}\n        \u003cRow className=\"mb-4\"\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eСтоимость портфеля\u003c/Card.Title\u003e\n                \u003cCard.Text className=\"summary-value\"\u003e₽{totalValue.toFixed(2)}\u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eВложено\u003c/Card.Title\u003e\n                \u003cCard.Text className=\"summary-value\"\u003e₽{totalInvested.toFixed(2)}\u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eПрибыль/Убыток\u003c/Card.Title\u003e\n                \u003cCard.Text className={`summary-value ${totalPnL \u003e= 0 ? 'text-success' : 'text-danger'}`}\u003e\n                  {totalPnL \u003e= 0 ? '+' : ''}₽{totalPnL.toFixed(2)} ({totalPnLPercent \u003e= 0 ? '+' : ''}{totalPnLPercent.toFixed(2)}%)\n                \u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Таблица позиций */}\n        \u003cRow\u003e\n          \u003cCol\u003e\n            \u003cdiv className=\"stock-table-container\"\u003e\n              \u003ch3\u003e\u003ci className=\"bi bi-list-ul\"\u003e\u003c/i\u003e Позиции\u003c/h3\u003e\n              {portfolio.length === 0 ? (\n                \u003cdiv className=\"text-center py-5 text-muted\"\u003e\n                  \u003ci className=\"bi bi-inbox\" style={{ fontSize: '3rem' }}\u003e\u003c/i\u003e\n                  \u003cp className=\"mt-3\"\u003eПортфель пуст. Добавьте первые бумаги!\u003c/p\u003e\n                \u003c/div\u003e\n              ) : (\n                \u003cTable responsive hover\u003e\n                  \u003cthead\u003e\n                    \u003ctr\u003e\n                      \u003cth\u003eБумага\u003c/th\u003e\n                      \u003cth\u003eТип\u003c/th\u003e\n                      \u003cth\u003eКоличество\u003c/th\u003e\n                      \u003cth\u003eСр. цена\u003c/th\u003e\n                      \u003cth\u003eТекущая цена\u003c/th\u003e\n                      \u003cth\u003eРыночная стоимость\u003c/th\u003e\n                      \u003cth\u003eПрибыль/Убыток\u003c/th\u003e\n                      \u003cth\u003e\u003c/th\u003e\n                    \u003c/tr\u003e\n                  \u003c/thead\u003e\n                  \u003ctbody\u003e\n                    {positionsWithData.map(position =\u003e (\n                      \u003ctr key={position.id}\u003e\n                        \u003ctd\u003e\n                          \u003cdiv className=\"table-ticker\"\u003e{position.ticker}\u003c/div\u003e\n                          \u003cdiv className=\"table-name\"\u003e{position.name}\u003c/div\u003e\n                        \u003c/td\u003e\n                        \u003ctd\u003e\n                          \u003cspan className={`badge ${position.type === 'bond' ? 'bg-info' : 'bg-primary'}`}\u003e\n                            {position.type === 'bond' ? 'Облигация' : 'Акция'}\n                          \u003c/span\u003e\n                        \u003c/td\u003e\n                        \u003ctd\u003e{position.quantity}\u003c/td\u003e\n                        \u003ctd\u003e₽{position.avgPrice.toFixed(2)}\u003c/td\u003e\n                        \u003ctd\u003e₽{position.currentPrice.toFixed(2)}\u003c/td\u003e\n                        \u003ctd\u003e₽{position.marketValue.toFixed(2)}\u003c/td\u003e\n                        \u003ctd className={position.pnl \u003e= 0 ? 'text-success' : 'text-danger'}\u003e\n                          {position.pnl \u003e= 0 ? '+' : ''}₽{position.pnl.toFixed(2)} ({position.pnlPercent \u003e= 0 ? '+' : ''}{position.pnlPercent.toFixed(2)}%)\n                        \u003c/td\u003e\n                        \u003ctd\u003e\n                          \u003cButton\n                            variant=\"outline-danger\"\n                            size=\"sm\"\n                            onClick={() =\u003e removePosition(position.id)}\n                          \u003e\n                            \u003ci className=\"bi bi-trash\"\u003e\u003c/i\u003e\n                          \u003c/Button\u003e\n                        \u003c/td\u003e\n                      \u003c/tr\u003e\n                    ))}\n                  \u003c/tbody\u003e\n                \u003c/Table\u003e\n              )}\n            \u003c/div\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Модальное окно */}\n        \u003cAddToPortfolioModal\n          show={showModal}\n          onClose={() =\u003e setShowModal(false)}\n          onAdd={addPosition}\n          securities={allSecurities}\n        /\u003e\n      \u003c/Container\u003e\n    \u003c/div\u003e\n  )\n}\n\nexport default PortfolioPage\n"
                }

ion.securityId)?.price || 0\n    const marketValue = currentPrice * position.quantity\n    const invested = position.avgPrice * position.quantity\n    const pnl = marketValue - invested\n    const pnlPercent = invested \u003e 0 ? (pnl / invested) * 100 : 0\n    \n    return {\n      ...position,\n      currentPrice,\n      marketValue,\n      pnl,\n      pnlPercent\n    }\n  })\n\n  const totalValue = getTotalValue(currentPrices)\n  const totalPnL = getTotalPnL(currentPrices)\n  const totalInvested = portfolio.reduce((sum, p) =\u003e sum + (p.avgPrice * p.quantity), 0)\n  const totalPnLPercent = totalInvested \u003e 0 ? (totalPnL / totalInvested) * 100 : 0\n\n  if (stocksLoading) {\n    return (\n      \u003cdiv className=\"app\"\u003e\n        \u003cHeader /\u003e\n        \u003cContainer className=\"py-4\"\u003e\n          \u003cLoadingSpinner /\u003e\n        \u003c/Container\u003e\n      \u003c/div\u003e\n    )\n  }\n\n  if (stocksError) {\n    return (\n      \u003cdiv className=\"app\"\u003e\n        \u003cHeader /\u003e\n        \u003cContainer className=\"py-4\"\u003e\n          \u003cErrorDisplay message={stocksError} onRetry={() =\u003e window.location.reload()} /\u003e\n        \u003c/Container\u003e\n      \u003c/div\u003e\n    )\n  }\n\n  return (\n    \u003cdiv className=\"app\"\u003e\n      \u003cHeader /\u003e\n      \u003cContainer className=\"py-4\"\u003e\n        {/* Заголовок */}\n        \u003cRow className=\"mb-4\"\u003e\n          \u003cCol\u003e\n            \u003cdiv className=\"d-flex justify-content-between align-items-center\"\u003e\n              \u003ch2\u003e\u003ci className=\"bi bi-briefcase\"\u003e\u003c/i\u003e Мой портфель\u003c/h2\u003e\n              \u003cButton variant=\"danger\" onClick={handleOpenModal}\u003e\n                \u003ci className=\"bi bi-plus-circle\"\u003e\u003c/i\u003e Добавить бумагу\n              \u003c/Button\u003e\n            \u003c/div\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n c/div\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Сводка */}\n        \u003cRow className=\"mb-4\"\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eСтоимость портфеля\u003c/Card.Title\u003e\n                \u003cCard.Text className=\"summary-value\"\u003e₽{totalValue.toFixed(2)}\u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eВложено\u003c/Card.Title\u003e\n                \u003cCard.Text className=\"summary-value\"\u003e₽{totalInvested.toFixed(2)}\u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eПрибыль/Убыток\u003c/Card.Title\u003e\n                \u003cCard.Text className={`summary-value ${totalPnL \u003e= 0 ? 'text-success' : 'text-danger'}`}\u003e\n                  {totalPnL \u003e= 0 ? '+' : ''}₽{totalPnL.toFixed(2)} ({totalPnLPercent \u003e= 0 ? '+' : ''}{totalPnLPercent.toFixed(2)}%)\n                \u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Таблица позиций */}\n        \u003cRow\u003e\n          \u003cCol\u003e\n            \u003cdiv className=\"stock-table-container\"\u003e\n              \u003ch3\u003e\u003ci className=\"bi bi-list-ul\"\u003e\u003c/i\u003e Позиции\u003c/h3\u003e\n              {portfolio.length === 0 ? (\n                 "newText": "import { useState, useEffect } from 'react'\nimport { Container, Row, Col, Button, Card, Table } from 'react-bootstrap'\nimport { usePortfolio } from '../hooks/usePortfolio'\nimport { useStocks } from '../hooks/useStocks'\nimport { fetchBonds, transformBondData } from '../api/moex'\nimport AddToPortfolioModal from '../components/AddToPortfolioModal'\nimport LoadingSpinner from '../components/LoadingSpinner'\nimport ErrorDisplay from '../components/ErrorDisplay'\nimport Header from '../components/Header'\n\nfunction PortfolioPage() {\n  const { portfolio, addPosition, removePosition, getTotalValue, getTotalPnL } = usePortfolio()\n  const { stocks: stockList, loading: stocksLoading, error: stocksError } = useStocks()\n  const [bonds, setBonds] = useState([])\n  const [showModal, setShowModal] = useState(false)\n  const [loadingBonds, setLoadingBonds] = useState(true)\n  const [bondsError, setBondsError] = useState(null)\n\n  // Загрузка облигаций при загрузке страницы\n  useEffect(() =\u003e {\n    const loadBonds = async () =\u003e {\n      try {\n        setLoadingBonds(true)\n        setBondsError(null)\n        const data = await fetchBonds()\n        const transformed = data\n          .filter(bond =\u003e bond.MARKET_LAST != null \u0026\u0026 bond.MARKET_LAST \u003e 0)\n          .map(transformBondData)\n        setBonds(transformed)\n      } catch (err) {\n        console.error('Ошибка загрузки облигаций:', err)\n        setBondsError(err.message)\n      } finally {\n        setLoadingBonds(false)\n      }\n    }\n    loadBonds()\n  }, [])\n\n  // Объединяем акции и облигации для выбора\n  const allSecurities = [...stockList, ...bonds]\n\n  // Получаем текущие цены для расчётов\n  const currentPrices = allSecurities.map(s =\u003e ({ id: s.id, price: s.price }))\n\n  // Позиции портфеля с текущими данными\n  const positionsWithData = portfolio.map(position =\u003e {\n    const currentPrice = currentPrices.find(p =\u003e p.id === position.securityId)?.price || 0\n    const marketValue = currentPrice * position.quantity\n    const invested = position.avgPrice * position.quantity\n    const pnl = marketValue - invested\n    const pnlPercent = invested \u003e 0 ? (pnl / invested) * 100 : 0\n    \n    return {\n      ...position,\n      currentPrice,\n      marketValue,\n      pnl,\n      pnlPercent\n    }\n  })\n\n  const totalValue = getTotalValue(currentPrices)\n  const totalPnL = getTotalPnL(currentPrices)\n  const totalInvested = portfolio.reduce((sum, p) =\u003e sum + (p.avgPrice * p.quantity), 0)\n  const totalPnLPercent = totalInvested \u003e 0 ? (totalPnL / totalInvested) * 100 : 0\n\n  if (stocksLoading) {\n    return (\n      \u003cdiv className=\"app\"\u003e\n        \u003cHeader /\u003e\n        \u003cContainer className=\"py-4\"\u003e\n          \u003cLoadingSpinner /\u003e\n        \u003c/Container\u003e\n      \u003c/div\u003e\n    )\n  }\n\n  if (stocksError) {\n    return (\n      \u003cdiv className=\"app\"\u003e\n        \u003cHeader /\u003e\n        \u003cContainer className=\"py-4\"\u003e\n          \u003cErrorDisplay message={stocksError} onRetry={() =\u003e window.location.reload()} /\u003e\n        \u003c/Container\u003e\n      \u003c/div\u003e\n    )\n  }\n\n  return (\n    \u003cdiv className=\"app\"\u003e\n      \u003cHeader /\u003e\n      \u003cContainer className=\"py-4\"\u003e\n        {/* Заголовок */}\n        \u003cRow className=\"mb-4\"\u003e\n          \u003cCol\u003e\n            \u003cdiv className=\"d-flex justify-content-between align-items-center\"\u003e\n              \u003ch2\u003e\u003ci className=\"bi bi-briefcase\"\u003e\u003c/i\u003e Мой портфель\u003c/h2\u003e\n              \u003cButton variant=\"danger\" onClick={() =\u003e setShowModal(true)} disabled={loadingBonds}\u003e\n                \u003ci className=\"bi bi-plus-circle\"\u003e\u003c/i\u003e {loadingBonds ? 'Загрузка...' : 'Добавить бумагу'}\n              \u003c/Button\u003e\n            \u003c/div\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Сводка */}\n        \u003cRow className=\"mb-4\"\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eСтоимость портфеля\u003c/Card.Title\u003e\n                \u003cCard.Text className=\"summary-value\"\u003e₽{totalValue.toFixed(2)}\u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eВложено\u003c/Card.Title\u003e\n                \u003cCard.Text className=\"summary-value\"\u003e₽{totalInvested.toFixed(2)}\u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eПрибыль/Убыток\u003c/Card.Title\u003e\n                \u003cCard.Text className={`summary-value ${totalPnL \u003e= 0 ? 'text-success' : 'text-danger'}`}\u003e\n                  {totalPnL \u003e= 0 ? '+' : ''}₽{totalPnL.toFixed(2)} ({totalPnLPercent \u003e= 0 ? '+' : ''}{totalPnLPercent.toFixed(2)}%)\n                \u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Таблица позиций */}\n        \u003cRow\u003e\n          \u003cCol\u003e\n            \u003cdiv className=\"stock-table-container\"\u003e\n              \u003ch3\u003e\u003ci className=\"bi bi-list-ul\"\u003e\u003c/i\u003e Позиции\u003c/h3\u003e\n              {portfolio.length === 0 ? (\n c.ticker} — {sec.shortname || sec.name}\n                    \u003c/option\u003e\n                  ))}\n                \u003c/Form.Select\u003e\n                \u003cForm.Text className=\"text-muted\"\u003e\n                  Показано {Math.min(filteredSecurities.length, 100)} из {filteredSecurities.length}\n                \u003c/Form.Text\u003e\n              \u003c/Form.Group\u003e\n\n              {selectedSec \u0026\u0026 (\n                \u003cdiv className=\"mb-3 p-3\" style={{ background: 'var(--bg-secondary)', borderRadius: '8px' }}\u003e\n                  \u003cdiv className=\"d-flex justify-content-between\"\u003e\n                    \u003cspan\u003eТекущая цена:\u003c/span\u003e\n                    \u003cstrong\u003e₽{selectedSec.price.toFixed(2)}\u003c/strong\u003e\n                  \u003c/div\u003e\n                  \u003cdiv className=\"d-flex justify-content-between\"\u003e\n                    \u003cspan\u003eТип:\u003c/span\u003e\n                    \u003cspan\u003e{securityType === 'bond' ? 'Облигация' : 'Акция'}\u003c/span\u003e\n                  \u003c/div\u003e\n                  {securityType === 'bond' \u0026\u0026 selectedSec.yield \u003e 0 \u0026\u0026 (\n                    \u003cdiv className=\"d-flex justify-content-between mt-2\"\u003e\n                      \u003cspan\u003eДоходность:\u003c/span\u003e\n                      \u003cspan className=\"text-success\"\u003e{selectedSec.yield.toFixed(2)}%\u003c/span\u003e\n                    \u003c/div\u003e\n                  )}\n                \u003c/div\u003e\n              )}\n\n              \u003cForm.Group className=\"mb-3\"\u003e\n                \u003cForm.Label\u003eКоличество (шт)\u003c/Form.Label\u003e\n                \u003cForm.Control\n                  type=\"number\"\n                  placeholder=\"0\"\n                  value={quantity}\n                  onChange={(e) =\u003e setQuantity(e.target.value)}\n                  min=\"1\"\n                  step=\"1 c) setAvgPrice(sec.price.toFixed(2))\n                  }}\n                \u003e\n                  \u003coption value=\"\"\u003eВыберите бумагу...\u003c/option\u003e\n                  {filteredSecurities.slice(0, 100).map(sec =\u003e (\n                    \u003coption key={sec.id} value={sec.id}\u003e\n                      {sec.ticker} — {sec.shortname || sec.name}\n                    \u003c/option\u003e\n                  ))}\n                \u003c/Form.Select\u003e\n                \u003cForm.Text className=\"text-muted\"\u003e\n                  Показано {Math.min(filteredSecurities.length, 100)} из {filteredSecurities.length}\n                \u003c/Form.Text\u003e\n              \u003c/Form.Group\u003e\n\n              {selectedSec \u0026\u0026 (\n                \u003cdiv className=\"mb-3 p-3\" style={{ background: 'var(--bg-secondary)', borderRadius: '8px' }}\u003e\n                  \u003cdiv className=\"d-flex justify-content-between\"\u003e\n                    \u003cspan\u003eТекущая цена:\u003c/span\u003e\n                    \u003cstrong\u003e₽{selectedSec.price.toFixed(2)}\u003c/strong\u003e\n                  \u003c/div\u003e\n                  \u003cdiv className=\"d-flex justify-content-between\"\u003e\n                    \u003cspan\u003eТип:\u003c/span\u003e\n                    \u003cspan\u003e{securityType === 'bond' ? 'Облигация' : 'Акция'}\u003c/span\u003e\n                  \u003c/div\u003e\n                  {securityType === 'bond' \u0026\u0026 selectedSec.yield \u003e 0 \u0026\u0026 (\n                    \u003cdiv className=\"d-flex justify-content-between mt-2\"\u003e\n                      \u003cspan\u003eДоходность:\u003c/span\u003e\n                      \u003cspan className=\"text-success\"\u003e{selectedSec.yield.toFixed(2)}%\u003c/span\u003e\n                    \u003c/div\u003e\n                  )}\n                \u003c/div\u003e\n              )}\n\n              \u003cForm.Group className=\"mb-3\"\u003e\n \"d-flex gap-2\"\u003e\n              \u003cButton variant=\"primary\" onClick={() =\u003e { setSecurityType('stock'); setShowModal(true) }}\u003e\n                \u003ci className=\"bi bi-graph-up\"\u003e\u003c/i\u003e Добавить акцию\n              \u003c/Button\u003e\n              \u003cButton variant=\"info\" onClick={() =\u003e { setSecurityType('bond'); setShowModal(true) }} disabled={loadingBonds}\u003e\n                \u003ci className=\"bi bi-bank\"\u003e\u003c/i\u003e {loadingBonds ? 'Загрузка...' : 'Добавить облигацию'}\n              \u003c/Button\u003e\n            \u003c/div\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Сводка */}\n        \u003cRow className=\"mb-4\"\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eСтоимость портфеля\u003c/Card.Title\u003e\n                \u003cCard.Text className=\"summary-value\"\u003e₽{totalValue.toFixed(2)}\u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eВложено\u003c/Card.Title\u003e\n                \u003cCard.Text className=\"summary-value\"\u003e₽{totalInvested.toFixed(2)}\u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n          \u003cCol md={4}\u003e\n            \u003cCard className=\"portfolio-summary\"\u003e\n              \u003cCard.Body\u003e\n                \u003cCard.Title className=\"text-muted\"\u003eПрибыль/Убыток\u003c/Card.Title\u003e\n                \u003cCard.Text className={`summary-value ${totalPnL \u003e= 0 ? 'text-success' : 'text-danger'}`}\u003e\n                  {totalPnL \u003e= 0 ? '+' : ''}₽{totalPnL.toFixed(2)} ({totalPnLPercent \u003e= 0 ? '+' : ''}{totalPnLPercent.toFixed(2)}%)\n                \u003c/Card.Text\u003e\n              \u003c/Card.Body\u003e\n            \u003c/Card\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Таблица позиций */}\n        \u003cRow\u003e\n          \u003cCol\u003e\n            \u003cdiv className=\"stock-table-container\"\u003e\n              \u003ch3\u003e\u003ci className=\"bi bi-list-ul\"\u003e\u003c/i\u003e Позиции\u003c/h3\u003e\n              {portfolio.length === 0 ? (\n                \u003cdiv className=\"text-center py-5 text-muted\"\u003e\n                  \u003ci className=\"bi bi-inbox\" style={{ fontSize: '3rem' }}\u003e\u003c/i\u003e\n                  \u003cp className=\"mt-3\"\u003eПортфель пуст. Добавьте первые бумаги!\u003c/p\u003e\n                \u003c/div\u003e\n              ) : (\n                \u003cTable responsive hover\u003e\n                  \u003cthead\u003e\n                    \u003ctr\u003e\n                      \u003cth\u003eБумага\u003c/th\u003e\n                      \u003cth\u003eТип\u003c/th\u003e\n                      \u003cth\u003eКоличество\u003c/th\u003e\n                      \u003cth\u003eСр. цена\u003c/th\u003e\n                      \u003cth\u003eТекущая цена\u003c/th\u003e\n                      \u003cth\u003eРыночная стоимость\u003c/th\u003e\n                      \u003cth\u003eПрибыль/Убыток\u003c/th\u003e\n                      \u003cth\u003e\u003c/th\u003e\n                    \u003c/tr\u003e\n                  \u003c/thead\u003e\n                  \u003ctbody\u003e\n                    {positionsWithData.map(position =\u003e (\n                      \u003ctr key={position.id}\u003e\n                        \u003ctd\u003e\n                          \u003cdiv className=\"table-ticker\"\u003e{position.ticker}\u003c/div\u003e\n                          \u003cdiv className=\"table-name\"\u003e{position.name}\u003c/div\u003e\n                        \u003c/td\u003e\n                        \u003ctd\u003e\n                          \u003cspan className={`badge ${position.type === 'bond' ? 'bg-info' : 'bg-primary'}`}\u003e\n                            {position.type === 'bond' ? 'Облигация' : 'Акция'}\n                          \u003c/span\u003e\n                        \u003c/td\u003e\n                        \u003ctd\u003e{position.quantity}\u003c/td\u003e\n                        \u003ctd\u003e₽{position.avgPrice.toFixed(2)}\u003c/td\u003e\n                        \u003ctd\u003e₽{position.currentPrice.toFixed(2)}\u003c/td\u003e\n                        \u003ctd\u003e₽{position.marketValue.toFixed(2)}\u003c/td\u003e\n                        \u003ctd className={position.pnl \u003e= 0 ? 'text-success' : 'text-danger'}\u003e\n                          {position.pnl \u003e= 0 ? '+' : ''}₽{position.pnl.toFixed(2)} ({position.pnlPercent \u003e= 0 ? '+' : ''}{position.pnlPercent.toFixed(2)}%)\n                        \u003c/td\u003e\n                        \u003ctd\u003e\n                          \u003cButton\n                            variant=\"outline-danger\"\n                            size=\"sm\"\n                            onClick={() =\u003e removePosition(position.id)}\n                          \u003e\n                            \u003ci className=\"bi bi-trash\"\u003e\u003c/i\u003e\n                          \u003c/Button\u003e\n                        \u003c/td\u003e\n                      \u003c/tr\u003e\n                    ))}\n                  \u003c/tbody\u003e\n                \u003c/Table\u003e\n              )}\n            \u003c/div\u003e\n          \u003c/Col\u003e\n        \u003c/Row\u003e\n\n        {/* Модальное окно */}\n        \u003cAddToPortfolioModal\n          show={showModal}\n          onClose={() =\u003e setShowModal(false)}\n          onAdd={addPosition}\n          stocks={stockList}\n          bonds={bonds}\n          securityType={securityType}\n          loading={securityType === 'bond' \u0026\u0026 loadingBonds}\n        /\u003e\n      \u003c/Container\u003e\n    \u003c/div\u003e\n  )\n}\n\nexport default PortfolioPage\n"
